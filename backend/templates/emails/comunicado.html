<!DOCTYPE html>
<html><head><meta charset='utf-8'><title>Comunicado</title></head>
<body style='font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;'>
  <h2 style='color: #1a56db;'>{{ titulo }}</h2>
  <p>Hola <strong>{{ nombre_tutor }}</strong>,</p>
  <p>La agencia de viajes ha publicado un comunicado para el viaje <strong>{{ nombre_viaje }}</strong>:</p>
  <div style='background:#f9f9f9;padding:16px;border-left:4px solid #1a56db;margin:16px 0;'>
    {{ cuerpo }}
  </div>
  <hr><p style='color:#666;font-size:12px;'>Tottem Hub</p>
</body></html>
